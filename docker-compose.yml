services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: settle-api
    command: npm run start:dev
    env_file:
      - .env
    ports:
      - '${PORT:-3002}:3000'
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3002}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    volumes:
      - .:/app
      - /app/node_modules
